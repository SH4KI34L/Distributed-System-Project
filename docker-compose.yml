services:
  # 1. KAFKA: The Entry Point (Message Broker)
  kafka:
    image: apache/kafka:latest
    container_name: loadlink-kafka-1
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://127.0.0.1:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  # 2. REDIS: The Fast Access Layer (Your predictions/results)
  redis:
    image: redis:alpine
    container_name: loadlink-redis-1
    ports:
      - "6379:6379"
    restart: always

  # 3. INFLUXDB: The Persistent Store (Historical data)
  influxdb:
    image: influxdb:2.7
    container_name: loadlink-influxdb-1
    ports:
      - "8086:8086"
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=password123
      - DOCKER_INFLUXDB_INIT_ORG=Loadlink
      - DOCKER_INFLUXDB_INIT_BUCKET=TrafficMetrics
      